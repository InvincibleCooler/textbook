<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Core Verbs & Prepositions</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --page-bg: #FFFFF0;
  --text-color: #2c2c2c;
  --heading-color: #1a3a5c;
  --def-border: #2563eb;
  --def-bg: #eef4ff;
  --sidebar-bg: #f8f8f0;
  --sidebar-hover: #e8e8d8;
}

.dark-mode {
  --page-bg: #1e1e1e;
  --text-color: #e0e0e0;
  --heading-color: #7ab3ef;
  --def-border: #4a90d9;
  --def-bg: #1a2a3a;
  --sidebar-bg: #2a2a2a;
  --sidebar-hover: #3a3a3a;
}

body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: var(--page-bg);
  color: var(--text-color);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px; background: #2c3e50; color: #fff; z-index: 100; flex-shrink: 0; font-size: 14px;
}
.toolbar button {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
}
.toolbar button:hover { background: rgba(255,255,255,0.25); }
.toolbar .page-info { font-size: 14px; min-width: 120px; text-align: center; }
.toolbar .tg { display: flex; gap: 8px; align-items: center; }

.sidebar {
  position: fixed; left: -360px; top: 0; width: 360px; height: 100vh;
  background: var(--sidebar-bg); z-index: 200; transition: left 0.3s ease;
  overflow-y: auto; box-shadow: 2px 0 12px rgba(0,0,0,0.3);
}
.sidebar.open { left: 0; }
.sidebar-hdr {
  position: sticky; top: 0; background: #2c3e50; color: #fff;
  padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  font-size: 16px; font-weight: 700;
}
.sidebar-hdr button { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 199; }
.overlay.open { display: block; }

.toc-list { list-style: none; padding: 8px 0; }
.toc-list li {
  padding: 8px 16px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.06);
  font-size: 14px; color: var(--text-color); transition: background 0.15s;
}
.toc-list li:hover { background: var(--sidebar-hover); }
.toc-list li.ch { font-weight: 700; font-size: 15px; color: var(--heading-color); padding-top: 12px; }
.toc-list li .pg { float: right; color: #999; font-size: 12px; }

.content-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; justify-content: center;
  background: var(--page-bg);
}

.page-content {
  background: var(--page-bg);
  max-width: 800px;
  width: 100%;
  padding: 32px;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-color);
}
.page-content::after {
  content: '';
  display: block;
  height: 80px;
}

.page-content.cover {
  background: linear-gradient(135deg, #1a3a2a, #2a5a4a, #1a3a2a);
  display: flex; align-items: center; justify-content: center; text-align: center;
  min-height: 400px;
}
.cv { color: #fff; }
.cv .sub { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 18px; letter-spacing: 4px; }
.cv .t1 { font-size: 30px; font-weight: 800; color: #d4a843; margin-bottom: 6px; }
.cv .t2 { font-size: 20px; font-weight: 700; color: #d4a843; margin-bottom: 24px; }
.cv .ln { width: 80px; height: 2px; background: #d4a843; margin: 0 auto 18px; }
.cv .inf { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 28px; line-height: 1.6; }

.page-content h1 { font-size: 22px; font-weight: 800; color: var(--heading-color); margin: 0 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--heading-color); }
.page-content h2 { font-size: 18px; font-weight: 700; color: var(--heading-color); margin: 20px 0 10px; }
.page-content h3 { font-size: 16px; font-weight: 700; color: var(--heading-color); margin: 16px 0 8px; }
.page-content h4 { font-size: 15px; font-weight: 700; color: var(--heading-color); margin: 12px 0 6px; }
.page-content p { margin: 6px 0; }
.page-content ul, .page-content ol { margin: 6px 0 6px 24px; }
.page-content li { margin: 3px 0; }
.page-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
.page-content th, .page-content td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
.page-content th { background: rgba(0,0,0,0.05); font-weight: 600; }
.dark-mode .page-content th { background: rgba(255,255,255,0.08); }
.dark-mode .page-content th, .dark-mode .page-content td { border-color: #555; }
.page-content hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
.dark-mode .page-content hr { border-top-color: #444; }
.page-content blockquote {
  margin: 10px 0; padding: 10px 16px; border-left: 4px solid var(--def-border);
  background: var(--def-bg); border-radius: 0 5px 5px 0; font-size: 14px;
}
.page-content code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
.dark-mode .page-content code { background: rgba(255,255,255,0.1); }

.bot {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 16px; background: #2c3e50; color: #fff; flex-shrink: 0; gap: 12px; font-size: 13px;
}
.bot button {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 6px 20px; border-radius: 4px; cursor: pointer; font-size: 14px;
}
.bot button:hover { background: rgba(255,255,255,0.25); }

.ld {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--page-bg); z-index: 9999; flex-direction: column; gap: 16px; font-size: 18px; color: #333;
}
.ld .sp { width: 40px; height: 40px; border: 4px solid #ccc; border-top-color: #2c3e50; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 800px) {
  .page-content { padding: 20px 16px; font-size: 14px; border-radius: 0; }
  .page-content h1 { font-size: 19px; }
  .page-content h2 { font-size: 16px; }
  .content-area { padding: 0; }
  .cv .t1 { font-size: 24px; }
  .cv .t2 { font-size: 17px; }
  .toolbar { padding: 4px 10px; font-size: 12px; }
  .sidebar { width: 85vw; left: -85vw; }
}
</style>
</head>
<body>

<div class="ld" id="ld"><div class="sp"></div><div>Loading textbook...</div></div>

<div class="overlay" id="ov"></div>
<div class="sidebar" id="sb">
  <div class="sidebar-hdr"><span>Contents</span><button id="sbClose">&times;</button></div>
  <ul class="toc-list" id="toc"></ul>
</div>

<div class="toolbar">
  <div class="tg"><button id="tocBtn">&#9776; Contents</button></div>
  <div class="page-info" id="pi">...</div>
  <div class="tg"><button id="dk">&#9789;</button></div>
</div>

<div class="content-area" id="ca">
  <div class="page-content" id="pg"></div>
</div>

<div class="bot">
  <button id="pv">&#9664; Prev</button>
  <span id="pi2">-</span>
  <button id="nx">Next &#9654;</button>
</div>

<script src="content.js"></script>
<script>
(function() {
  'use strict';

  var allSections = [];
  var tocEntries = [];
  var currentPage = 0;

  function buildSections() {
    var sections = [];
    var toc = [];

    // Cover
    sections.push({type: 'cover'});

    for (var s = 0; s < TEXTBOOK_SECTIONS.length; s++) {
      var section = TEXTBOOK_SECTIONS[s];
      var md = section.content;
      var tm = md.match(/^#+\s+(.+)/m);
      var title = tm ? tm[1].replace(/\*\*/g, '') : section.name;
      var isChapter = /^#\s/.test(md.trim());
      toc.push({title: title, pageIndex: sections.length, isChapter: isChapter});
      sections.push({type: 'content', html: marked.parse(md), section: section.name});
    }

    return {sections: sections, toc: toc};
  }

  function showPage(idx) {
    if (idx < 0 || idx >= allSections.length) return;
    currentPage = idx;
    var pg = document.getElementById('pg');
    var data = allSections[idx];

    if (data.type === 'cover') {
      pg.className = 'page-content cover';
      pg.innerHTML =
        '<div class="cv">' +
          '<div class="sub">NATIVE SENSE APPROACH</div>' +
          '<div class="ln"></div>' +
          '<div class="t1">English Core</div>' +
          '<div class="t2">Verbs & Prepositions</div>' +
          '<div class="ln"></div>' +
          '<div class="inf">Part 1: Core Verbs (12) &middot; Part 2: Prepositions (44)<br>' +
          'Feel it, don\'t memorize it.</div>' +
        '</div>';
    } else {
      pg.className = 'page-content';
      pg.innerHTML = data.html;
    }

    document.getElementById('ca').scrollTop = 0;
    upPI();
  }

  function upPI() {
    var txt = (currentPage + 1) + ' / ' + allSections.length;
    document.getElementById('pi').textContent = txt;
    document.getElementById('pi2').textContent = txt;
  }

  function init() {
    var result = buildSections();
    allSections = result.sections;
    tocEntries = result.toc;

    // Build TOC
    var tocUl = document.getElementById('toc');
    tocUl.innerHTML = '';
    for (var t = 0; t < tocEntries.length; t++) {
      var e = tocEntries[t];
      var li = document.createElement('li');
      if (e.isChapter) li.className = 'ch';
      li.innerHTML = e.title + ' <span class="pg">p.' + e.pageIndex + '</span>';
      li.setAttribute('data-p', e.pageIndex);
      tocUl.appendChild(li);
    }
    tocUl.addEventListener('click', function(ev) {
      var li = ev.target.closest('[data-p]');
      if (li) { showPage(parseInt(li.getAttribute('data-p'))); closeSb(); }
    });

    showPage(0);
    document.getElementById('ld').style.display = 'none';
  }

  // Sidebar
  function openSb() { document.getElementById('sb').classList.add('open'); document.getElementById('ov').classList.add('open'); }
  function closeSb() { document.getElementById('sb').classList.remove('open'); document.getElementById('ov').classList.remove('open'); }

  document.getElementById('tocBtn').addEventListener('click', openSb);
  document.getElementById('sbClose').addEventListener('click', closeSb);
  document.getElementById('ov').addEventListener('click', closeSb);
  document.getElementById('pv').addEventListener('click', function() { showPage(currentPage - 1); });
  document.getElementById('nx').addEventListener('click', function() { showPage(currentPage + 1); });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showPage(currentPage + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') showPage(currentPage - 1);
  });

  // Touch swipe
  var touchStartX = 0;
  document.getElementById('ca').addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive: true});
  document.getElementById('ca').addEventListener('touchend', function(e) {
    var diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 50) {
      if (diff < 0) showPage(currentPage + 1);
      else showPage(currentPage - 1);
    }
  }, {passive: true});

  // Dark mode
  var dark = false;
  document.getElementById('dk').addEventListener('click', function() {
    dark = !dark;
    document.documentElement.classList.toggle('dark-mode', dark);
    document.body.classList.toggle('dark-mode', dark);
    this.textContent = dark ? '\u2600' : '\u263D';
  });

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
