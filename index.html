<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>중학교 수학 1 - 1학기</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
    processEnvironments: true
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    ignoreHtmlClass: 'no-mathjax'
  },
  startup: {
    ready: function() {
      MathJax.startup.defaultReady();
      window.mathJaxReady = true;
    }
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --page-bg: #FFFFF0;
  --text-color: #2c2c2c;
  --heading-color: #1a3a5c;
  --def-border: #2563eb;
  --def-bg: #eef4ff;
  --example-border: #e67e22;
  --example-bg: #fef6ee;
  --check-border: #27ae60;
  --check-bg: #eefbf3;
  --cover-gold: #d4a843;
  --sidebar-bg: #f8f8f0;
  --sidebar-hover: #e8e8d8;
}

.dark-mode {
  --page-bg: #1e1e1e;
  --text-color: #e0e0e0;
  --heading-color: #7ab3ef;
  --def-border: #4a90d9;
  --def-bg: #1a2a3a;
  --example-border: #d4883a;
  --example-bg: #2a2018;
  --check-border: #3aaf6a;
  --check-bg: #1a2a1e;
  --sidebar-bg: #2a2a2a;
  --sidebar-hover: #3a3a3a;
}

body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: #e8e0d0;
  color: var(--text-color);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.dark-mode body, body.dark-mode { background: #121212; }

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: #2c3e50;
  color: #fff;
  z-index: 100;
  flex-shrink: 0;
  font-size: 14px;
}
.toolbar button {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
}
.toolbar button:hover { background: rgba(255,255,255,0.25); }
.toolbar .page-info { font-size: 14px; min-width: 120px; text-align: center; }
.toolbar .tg { display: flex; gap: 8px; align-items: center; }

/* Sidebar */
.sidebar {
  position: fixed;
  left: -360px;
  top: 0;
  width: 360px;
  height: 100vh;
  background: var(--sidebar-bg);
  z-index: 200;
  transition: left 0.3s ease;
  overflow-y: auto;
  box-shadow: 2px 0 12px rgba(0,0,0,0.3);
}
.sidebar.open { left: 0; }
.sidebar-hdr {
  position: sticky; top: 0;
  background: #2c3e50; color: #fff;
  padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 16px; font-weight: 700;
}
.sidebar-hdr button { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 199;
}
.overlay.open { display: block; }

.toc-list { list-style: none; padding: 8px 0; }
.toc-list li {
  padding: 8px 16px; cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  font-size: 14px; color: var(--text-color);
  transition: background 0.15s;
}
.toc-list li:hover { background: var(--sidebar-hover); }
.toc-list li.ch { font-weight: 700; font-size: 15px; color: var(--heading-color); padding-top: 12px; }
.toc-list li .pg { float: right; color: #999; font-size: 12px; }

/* Book container */
.book-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}

/* StPageFlip overrides */
.stf__parent { margin: 0 auto; }

/* Page */
.page {
  background: var(--page-bg);
  padding: 28px 32px;
  overflow: hidden;
  font-size: 14.5px;
  line-height: 1.72;
  color: var(--text-color);
  position: relative;
}

/* Cover */
.page.cover-page {
  background: linear-gradient(135deg, #1a2a4a, #2c4a7a, #1a2a4a);
  display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 40px;
}
.cv { color: #fff; }
.cv .sub { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 18px; letter-spacing: 4px; }
.cv .t1 { font-size: 34px; font-weight: 800; color: var(--cover-gold); margin-bottom: 6px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.cv .t2 { font-size: 26px; font-weight: 700; color: var(--cover-gold); margin-bottom: 24px; }
.cv .ln { width: 80px; height: 2px; background: var(--cover-gold); margin: 0 auto 18px; }
.cv .inf { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 28px; line-height: 1.6; }

.page.back-cover {
  background: linear-gradient(135deg, #1a2a4a, #2c4a7a, #1a2a4a);
  display: flex; align-items: center; justify-content: center;
  text-align: center; color: rgba(255,255,255,0.5); font-size: 14px;
}

/* Content typography */
.page h1 {
  font-size: 20px; font-weight: 800; color: var(--heading-color);
  margin: 0 0 12px; padding-bottom: 6px;
  border-bottom: 2px solid var(--heading-color);
}
.page h2 { font-size: 17px; font-weight: 700; color: var(--heading-color); margin: 12px 0 8px; }
.page h3 { font-size: 15px; font-weight: 700; color: var(--heading-color); margin: 10px 0 6px; }
.page h4 { font-size: 14px; font-weight: 700; color: var(--heading-color); margin: 8px 0 4px; }
.page p { margin: 5px 0; }
.page ul, .page ol { margin: 5px 0 5px 20px; }
.page li { margin: 2px 0; }
.page table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
.page th, .page td { border: 1px solid #ccc; padding: 4px 7px; text-align: center; }
.page th { background: rgba(0,0,0,0.05); font-weight: 600; }
.dark-mode .page th { background: rgba(255,255,255,0.08); }
.dark-mode .page th, .dark-mode .page td { border-color: #555; }
.page hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }
.dark-mode .page hr { border-top-color: #444; }

/* Blockquotes */
.page blockquote {
  margin: 8px 0; padding: 8px 12px;
  border-left: 4px solid var(--def-border);
  background: var(--def-bg);
  border-radius: 0 5px 5px 0;
  font-size: 13.5px;
}
.box-example { border-left-color: var(--example-border); background: var(--example-bg); }
.box-check { border-left-color: var(--check-border); background: var(--check-bg); }

/* Page number */
.pg-num {
  position: absolute; bottom: 8px; font-size: 11px; color: #aaa;
}
.pg-num.l { left: 16px; }
.pg-num.r { right: 16px; }

/* Bottom bar */
.bot {
  display: flex; align-items: center; justify-content: center;
  padding: 7px 16px; background: #2c3e50; color: #fff;
  flex-shrink: 0; gap: 12px; font-size: 13px;
}
.bot button {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff; padding: 5px 16px;
  border-radius: 4px; cursor: pointer; font-size: 13px;
}
.bot button:hover { background: rgba(255,255,255,0.25); }
.bot button:disabled { opacity: 0.4; cursor: default; }

/* Loading */
.ld {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #e8e0d0; z-index: 9999;
  flex-direction: column; gap: 16px; font-size: 18px; color: #333;
}
.ld .sp {
  width: 40px; height: 40px;
  border: 4px solid #ccc; border-top-color: #2c3e50;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MathJax */
.MathJax { font-size: 100% !important; }
mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; margin: 8px 0; }

/* Responsive */
@media (max-width: 800px) {
  .page { padding: 16px 14px; font-size: 13px; }
  .page h1 { font-size: 17px; }
  .page h2 { font-size: 15px; }
  .cv .t1 { font-size: 24px; }
  .cv .t2 { font-size: 18px; }
  .toolbar { padding: 4px 10px; font-size: 12px; }
  .sidebar { width: 85vw; left: -85vw; }
}
</style>
</head>
<body>

<div class="ld" id="ld"><div class="sp"></div><div>교과서를 준비하고 있습니다...</div></div>

<div class="overlay" id="ov"></div>
<div class="sidebar" id="sb">
  <div class="sidebar-hdr"><span>목차</span><button id="sbClose">&times;</button></div>
  <ul class="toc-list" id="toc"></ul>
</div>

<div class="toolbar">
  <div class="tg"><button id="tocBtn">&#9776; 목차</button></div>
  <div class="page-info" id="pi">...</div>
  <div class="tg"><button id="dk">&#9789;</button></div>
</div>

<div class="book-area" id="ba"><div id="bk"></div></div>

<div class="bot">
  <button id="pv">&#9664; 이전</button>
  <span id="pi2">-</span>
  <button id="nx">다음 &#9654;</button>
</div>

<script src="content.js"></script>
<script>
(function() {
  'use strict';

  // --- Markdown rendering with math protection ---
  function protectMath(md) {
    var placeholders = [];
    var idx = 0;
    md = md.replace(/\$\$([\s\S]*?)\$\$/g, function(m, inner) {
      var ph = '\x00MATH' + (idx++) + 'MATH\x00';
      placeholders.push({ph: ph, val: '$$' + inner + '$$'});
      return ph;
    });
    md = md.replace(/\$([^\$\n]+?)\$/g, function(m, inner) {
      var ph = '\x00MATH' + (idx++) + 'MATH\x00';
      placeholders.push({ph: ph, val: '$' + inner + '$'});
      return ph;
    });
    return {md: md, placeholders: placeholders};
  }

  function restoreMath(html, placeholders) {
    for (var i = 0; i < placeholders.length; i++) {
      html = html.split(placeholders[i].ph).join(placeholders[i].val);
    }
    return html;
  }

  function renderMd(md) {
    var p = protectMath(md);
    var html = marked.parse(p.md);
    html = restoreMath(html, p.placeholders);
    return html;
  }

  // --- State ---
  var pageFlip = null;
  var allPages = [];
  var tocEntries = [];
  var isMobile = window.innerWidth <= 800;
  var isFlipping = false;
  var lastFlipTime = 0;
  var FLIP_COOLDOWN = 400; // ms - ignore clicks within this window
  var typesetPages = {};

  // --- Build pages ---
  function buildPages() {
    var pages = [];
    var toc = [];

    pages.push({type: 'cover'});

    for (var s = 0; s < TEXTBOOK_SECTIONS.length; s++) {
      var section = TEXTBOOK_SECTIONS[s];
      var md = section.content;
      var tm = md.match(/^#+\s+(.+)/m);
      var title = tm ? tm[1].replace(/\*\*/g, '') : section.name;
      var isChapter = /^#\s/.test(md.trim());

      toc.push({title: title, pageIndex: pages.length, isChapter: isChapter});

      var parts = md.split(/\n---\n/);
      for (var i = 0; i < parts.length; i++) {
        var part = parts[i].trim();
        if (!part) continue;
        var html = renderMd(part);
        pages.push({type: 'content', html: html, section: section.name});
      }
    }

    pages.push({type: 'back'});
    if (pages.length % 2 !== 0) {
      pages.push({type: 'blank'});
    }

    return {pages: pages, toc: toc};
  }

  // --- Create page DOM ---
  function makePage(data, idx) {
    var div = document.createElement('div');
    div.className = 'page';

    if (data.type === 'cover' || data.type === 'back') {
      div.setAttribute('data-density', 'hard');
    }

    if (data.type === 'cover') {
      div.classList.add('cover-page');
      div.innerHTML =
        '<div class="cv">' +
          '<div class="sub">2022 개정 교육과정</div>' +
          '<div class="ln"></div>' +
          '<div class="t1">중학교 수학 1</div>' +
          '<div class="t2">1학기</div>' +
          '<div class="ln"></div>' +
          '<div class="inf">I. 소인수분해 &middot; II. 정수와 유리수 &middot; III. 문자와 식<br>' +
          'IV. 일차방정식 &middot; V. 좌표평면과 그래프</div>' +
        '</div>';
    } else if (data.type === 'back') {
      div.classList.add('back-cover');
      div.innerHTML = '<div>중학교 수학 1 &mdash; 1학기<br><br>교과서 웹 뷰어</div>';
    } else if (data.type === 'blank') {
      div.innerHTML = '';
    } else {
      var side = (idx % 2 === 0) ? 'l' : 'r';
      div.innerHTML =
        '<div style="width:100%;height:calc(100% - 20px);overflow:hidden;">' + data.html + '</div>' +
        '<div class="pg-num ' + side + '">' + idx + '</div>';
    }
    return div;
  }

  // --- Throttled flip ---
  function canFlip() {
    if (!pageFlip || isFlipping) return false;
    var now = Date.now();
    if (now - lastFlipTime < FLIP_COOLDOWN) return false;
    lastFlipTime = now;
    return true;
  }
  function safeFlipNext() { if (canFlip()) pageFlip.flipNext(); }
  function safeFlipPrev() { if (canFlip()) pageFlip.flipPrev(); }

  // --- Init ---
  function init() {
    var result = buildPages();
    allPages = result.pages;
    tocEntries = result.toc;

    var bkEl = document.getElementById('bk');
    var ba = document.getElementById('ba');
    bkEl.innerHTML = '';

    var cw = ba.clientWidth;
    var ch = ba.clientHeight;
    var pageW, pageH;

    if (isMobile) {
      pageW = Math.min(cw - 12, 480);
      pageH = ch - 12;
    } else {
      var maxW = (cw - 40) / 2;
      var maxH = ch - 16;
      var ratio = 0.7;
      if (maxW / maxH > ratio) {
        pageH = maxH;
        pageW = Math.floor(pageH * ratio);
      } else {
        pageW = Math.floor(maxW);
        pageH = Math.floor(pageW / ratio);
      }
    }

    for (var i = 0; i < allPages.length; i++) {
      bkEl.appendChild(makePage(allPages[i], i));
    }

    // Build sidebar TOC
    var tocUl = document.getElementById('toc');
    tocUl.innerHTML = '';
    for (var t = 0; t < tocEntries.length; t++) {
      var e = tocEntries[t];
      var li = document.createElement('li');
      if (e.isChapter) li.className = 'ch';
      li.innerHTML = e.title + ' <span class="pg">p.' + e.pageIndex + '</span>';
      li.setAttribute('data-p', e.pageIndex);
      tocUl.appendChild(li);
    }
    tocUl.addEventListener('click', function(ev) {
      var li = ev.target.closest('[data-p]');
      if (li && canFlip()) {
        pageFlip.flip(parseInt(li.getAttribute('data-p')));
        closeSb();
      }
    });

    // Init StPageFlip - OPTIMIZED
    pageFlip = new St.PageFlip(bkEl, {
      width: pageW,
      height: pageH,
      size: 'fixed',
      showCover: true,
      mobileScrollSupport: false,
      usePortrait: isMobile,
      drawShadow: true,
      flippingTime: 350,          // Fast flip (was 700-800)
      maxShadowOpacity: 0.2,
      startPage: 0,
      autoSize: false,
      clickEventForward: false,
      swipeDistance: 40             // Higher threshold to prevent accidental swipes
    });

    pageFlip.loadFromHTML(document.querySelectorAll('#bk .page'));

    // Debounce: track flip start/end
    pageFlip.on('changeState', function(ev) {
      // ev.data is the new state: 'flipping', 'user_fold', 'fold_corner', 'read'
      if (ev.data === 'flipping' || ev.data === 'user_fold') {
        isFlipping = true;
      } else {
        isFlipping = false;
      }
    });

    pageFlip.on('flip', function(ev) {
      isFlipping = false;
      upPI(ev.data);
      doTypeset(ev.data);
    });

    upPI(0);

    // Initial MathJax typeset - only first few pages
    setTimeout(function() {
      if (window.MathJax && MathJax.typesetPromise) {
        var pages = document.querySelectorAll('#bk .page');
        var initial = [];
        for (var i = 0; i < Math.min(4, pages.length); i++) {
          initial.push(pages[i]);
          typesetPages[i] = true;
        }
        MathJax.typesetPromise(initial).catch(function() {});
      }
    }, 300);

    document.getElementById('ld').style.display = 'none';
  }

  // --- MathJax typeset for visible pages (only new ones) ---
  function doTypeset(pg) {
    if (!window.MathJax || !MathJax.typesetPromise) return;
    var pages = document.querySelectorAll('#bk .page');
    var targets = [];
    for (var i = Math.max(0, pg - 1); i <= Math.min(pages.length - 1, pg + 2); i++) {
      if (!typesetPages[i]) {
        targets.push(pages[i]);
        typesetPages[i] = true;
      }
    }
    if (targets.length > 0) {
      MathJax.typesetPromise(targets).catch(function() {});
    }
  }

  // --- Page info ---
  function upPI(pg) {
    var total = allPages.length;
    var txt = (pg + 1) + ' / ' + total;
    document.getElementById('pi').textContent = txt;
    document.getElementById('pi2').textContent = txt;
  }

  // --- Sidebar ---
  function openSb() {
    document.getElementById('sb').classList.add('open');
    document.getElementById('ov').classList.add('open');
  }
  function closeSb() {
    document.getElementById('sb').classList.remove('open');
    document.getElementById('ov').classList.remove('open');
  }

  // --- Events with debounce ---
  document.getElementById('tocBtn').addEventListener('click', openSb);
  document.getElementById('sbClose').addEventListener('click', closeSb);
  document.getElementById('ov').addEventListener('click', closeSb);
  document.getElementById('pv').addEventListener('click', safeFlipPrev);
  document.getElementById('nx').addEventListener('click', safeFlipNext);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { safeFlipNext(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { safeFlipPrev(); e.preventDefault(); }
  });

  // Dark mode
  var dark = false;
  document.getElementById('dk').addEventListener('click', function() {
    dark = !dark;
    document.documentElement.classList.toggle('dark-mode', dark);
    document.body.classList.toggle('dark-mode', dark);
    this.textContent = dark ? '\u2600' : '\u263D';
  });

  // Resize
  var rto;
  window.addEventListener('resize', function() {
    clearTimeout(rto);
    rto = setTimeout(function() {
      var nm = window.innerWidth <= 800;
      if (nm !== isMobile) {
        isMobile = nm;
        typesetPages = {};
        init();
      }
    }, 600);
  });

  // Start
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
