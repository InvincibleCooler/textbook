<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과서 웹 뷰어</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: #f5f0e8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 720px;
  width: 100%;
  padding: 40px 20px;
}
h1 {
  text-align: center;
  font-size: 28px;
  color: #2c2c2c;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 40px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}
.card-header {
  padding: 28px 24px 20px;
  color: #fff;
  text-align: center;
}
.card-header.math { background: linear-gradient(135deg, #1a2a4a, #2c4a7a); }
.card-header.history { background: linear-gradient(135deg, #3a1a0a, #6b3a1a); }
.card-header .icon { font-size: 36px; margin-bottom: 8px; }
.card-header h2 { font-size: 20px; font-weight: 700; }
.card-header .sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.card-body {
  padding: 16px 24px 20px;
}
.card-body p {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
}
.card-body .tags {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.card-body .tag {
  background: #f0f0f0;
  color: #555;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
  <h1>교과서 웹 뷰어</h1>
  <p class="subtitle">페이지를 넘기며 읽는 온라인 교과서</p>
  <div class="cards">
    <a class="card" href="middle_school_math_1_1/">
      <div class="card-header math">
        <div class="icon">&#9889;</div>
        <h2>중학교 수학 1</h2>
        <div class="sub">1학기</div>
      </div>
      <div class="card-body">
        <p>소인수분해, 정수와 유리수, 문자와 식, 일차방정식, 좌표평면과 그래프</p>
        <div class="tags">
          <span class="tag">2022 개정 교육과정</span>
          <span class="tag">중학교 1학년</span>
        </div>
      </div>
    </a>
    <a class="card" href="world_history/">
      <div class="card-header history">
        <div class="icon">&#127758;</div>
        <h2>세계사 조약</h2>
        <div class="sub">한눈에 보기</div>
      </div>
      <div class="card-body">
        <p>베스트팔렌부터 INF까지, 수능 빈출 29개 조약을 시대별로 정리</p>
        <div class="tags">
          <span class="tag">수능 대비</span>
          <span class="tag">29개 조약</span>
          <span class="tag">키워드 색인</span>
        </div>
      </div>
    </a>
    <a class="card" href="english_core_verbs/">
      <div class="card-header" style="background: linear-gradient(135deg, #1a3a2a, #2a5a4a);">
        <div class="icon">&#127468;&#127463;</div>
        <h2>English Core</h2>
        <div class="sub">Verbs & Prepositions</div>
      </div>
      <div class="card-body">
        <p>핵심 동사 12개 + 전치사 44개의 네이티브 감각을 잡는다</p>
        <div class="tags">
          <span class="tag">감각 중심</span>
          <span class="tag">동사 12개</span>
          <span class="tag">전치사 44개</span>
        </div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
